<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Game Night</title>
  <defs>
    <linearGradient id="bg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#27205f"/>
      <stop offset="1" stop-color="#090b18"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <path d="M16 17h32" stroke="#8d72ff" stroke-width="2" stroke-linecap="round" opacity=".7"/>
  <text x="32" y="43" text-anchor="middle" fill="#d8ff43" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="800" letter-spacing="-2" filter="url(#glow)">1%</text>
  <circle cx="49" cy="16" r="4" fill="#50e7ff"/>
</svg>
